spring:
  datasource:
    url: jdbc:h2:mem:forumdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8080

logging:
  level:
    root: INFO
    com.hansol.forum: DEBUG

jwt:
  secret: myForumSecretkeyThatIsAtLeast256BitsLongForHS256Algorithm2025
  expiration: 86400000
