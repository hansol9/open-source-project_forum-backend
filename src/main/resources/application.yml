spring:
  datasource:
    url: jdbc:h2:mem:forumdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.hansol.forum: DEBUG

jwt:
  secret: myForumSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2025
  expiration: 86400000